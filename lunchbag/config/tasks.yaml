# ════════════════════════════════════════════════════════════
# TASK 2 — CREATIVE BRIEF (MONTHLY)
# ════════════════════════════════════════════════════════════
build_creative_brief:
  description: >
    STEP 0 — READ CAMPAIGN CONCEPT:
    First call the ConceptReaderTool.
    If it returns content use it as the
    narrative foundation for the entire brief.
    The concept defines the STORY and SITUATION.
    The reference images define the AESTHETIC
    and EXECUTION. Both inform the brief equally.

    If the concept file is empty or absent
    skip this step and proceed directly to
    reading the reference images.

    When both concept and refs are present
    write the brief so that:
    - The concept defines what is happening
      and why — the narrative
    - The reference images define how it looks
      — the visual execution
    - Together they produce a brief that is
      both narratively specific and visually
      precise

    Never let the concept override the visual
    refs entirely — they work together.
    Never let the visual refs produce a brief
    with no narrative direction if a concept
    file exists.

    Build a Creative Brief for this sprint.

    STEP 1 — READ THE CONCEPT FILE:
    Call ConceptReaderTool first.
    If content exists use it as additional
    context. If empty proceed to Step 2.

    STEP 2 — READ THE REFERENCE IMAGES:
    Call StyleReferenceReaderTool and
    CompositionReaderTool on all images in
    references/ folder.

    The reference images ARE the creative
    direction for this sprint. They define
    EVERYTHING:
    - The setting and location
    - The lighting and colour
    - Whether a model is present or not
    - What props appear
    - The mood and energy
    - The composition style
    - The overall concept

    STEP 3 — WRITE THE BRIEF:
    The brief has ONE job: describe the world
    of the reference images precisely enough
    that the Visual Director can recreate it
    with The Lunchbags product.

    For each reference image write:
    - SETTING: exactly where this is
    - LIGHTING: quality, direction, source
    - SUBJECT: model present or product only
    - PROPS: everything visible in the scene
    - MOOD: the feeling of the image
    - COMPOSITION: how the shot is framed

    Then write:
    - TOTAL SHOTS: {images_per_sprint}
    - SHOT DISTRIBUTION: based on what the
      refs show — if refs have no model then
      no model shots. If refs show product
      on surfaces then product-on-surface shots.
      Follow the refs exactly.

    WHAT TO NEVER DO:
    - Never invent a setting not in the refs
    - Never add a model if refs have no model
    - Never remove props that appear in refs
    - Never change the colour world of the refs
    - Never apply a fixed brand aesthetic
      that contradicts what the refs show
    - Never mention Mediterranean, warm tones,
      or any fixed aesthetic unless the refs
      actually show this

    The refs change every sprint.
    The brand is always The Lunchbags.
    The product is always the bag.
    Everything else follows the refs.

    Brand: {brand_name}
    Products: {product_focus}
    Materials: {product_materials}
    Never include: {shoot_dont_list}
  expected_output: >
    CREATIVE BRIEF — {brand_name} — {current_season} Shoot

    TREND SIGNALS APPLIED
    [Which HIGH/MEDIUM signals from the trend file influenced
    this brief, or: NO TREND FILE — proceeded without]

    OVERVIEW
    [2-3 sentences on the shoot's purpose and direction,
    specific to {brand_name}'s 3D printed cotton bags
    and Mediterranean identity]

    MATERIAL NOTE FOR VISUAL DIRECTOR
    [How the 3d cotton surface should influence
    lighting choices and composition in this shoot]

    SHOT REQUIREMENTS
    Total shots: {images_per_sprint}
    Format: ALL shots are 3:4 portrait orientation — no exceptions.
    SHOT TYPE MIX:
    - bag in use: [N] shots
    - Product only: [N] shots
    - Detail close-up: [N] shots
    - Lifestyle context: [N] shots
    - Held or handled: [N] shots

    PRIORITY PRODUCTS THIS SPRINT
    [bag name] — [N] shots — reason: [tie to launch or campaign]
    (repeat per product)

    AESTHETIC DIRECTIONS TO EXPLORE
    Direction 1: [name] — [3-4 sentences grounded in mood_references]
    Direction 2: [name] — [3-4 sentences]
    Direction 3: [name] — [optional third direction]

    AUDIENCE RESONANCE
    [What must these images make {target_audience} feel?
    Be specific to a 25-42 year old Greek woman who values
    bold self-expression and sustainability. 3-4 sentences.]

    CONSTRAINTS — MUST NOT INCLUDE
    [Pulled directly from {shoot_dont_list} — bullet list]
  agent: content_strategist
  output_file: outputs/creative_brief.md

# ════════════════════════════════════════════════════════════
# TASK 3 — STYLE BIBLE & SHOT LIST
# ════════════════════════════════════════════════════════════
create_style_bible:
  description: >
    SET ARCHITECTURE — NON NEGOTIABLE:
    You must always create EXACTLY 3 sets.
    No more, no less. Every sprint has 3 sets.
    Each set must use the location and theme
    defined in concept.md for that set.
    Follow the concept.md set definitions
    exactly — do not invent your own locations.

    SHOT COUNT PER SET — NON NEGOTIABLE:
    SET 1: exactly 17 shots
    SET 2: exactly 17 shots
    SET 3: exactly 16 shots
    Total: 50 shots across all 3 sets.
    Count your shots before finalising.

    Write the Style Bible and Shot List for
    this sprint based entirely on the
    Creative Brief.

    The Creative Brief describes the world
    of the reference images. Your job is to
    define sets and shots that recreate that
    world with The Lunchbags product.

    SET STRUCTURE:
    Define exactly 3 sets based on the distinct
    scenes visible in the reference images.
    Each set = one reference image concept.

    For each set write:
    - SET NAME: descriptive name from the ref
    - SETTING: exact location from the ref
    - LIGHTING: exact lighting from the ref
    - PROPS: exact props from the ref
    - SUBJECT: model or product-only
      (follow the ref — do not add a model
      if the ref has no model)
    - MOOD: the feeling of the ref
    - SHOT COUNT: how many shots in this set
    - SET DNA PROMPT BLOCK:
      Write 60-80 words describing the creative
      world of this set — inspired by the refs
      but not copying them. Describe:
      - The TYPE of setting (not the exact props)
      - The lighting language
      - The colour world
      - The energy and mood
      - Whether model is present or absent

      Write it as creative direction not as a
      scene description. Example:
      "Bold graphic setting with strong colour
      contrast. Hard directional light creating
      dramatic shadows. Industrial or sports
      context with thematic props. Product-only,
      no model. High energy, editorial mood."

      This block will be injected into every
      generation prompt for this set. It should
      inspire fresh compositions not replicate
      a specific scene.

      HARD RULE FOR DNA BLOCKS:
      Never write language that implies the bag is
      worn over the shoulder, carried crossbody,
      or slung like a messenger bag. This product
      has ONE short top handle only. If the ref
      shows a crossbody bag — adapt the scene
      to a hand-held or set-down composition.
      Never copy a carry method that requires
      a strap.

    MODEL ANCHOR PER SET:
    For each set that includes a model,
    write a MODEL ANCHOR block immediately
    after the SET DNA PROMPT BLOCK:
    "MODEL ANCHOR — SET N: [gender, approximate
    age, skin tone, hair, clothing style — based
    strictly on the Set N reference images.
    This person must appear consistently in
    every model shot of this set.]"

    Do not write one global model description.
    Each set has its own anchor drawn from
    its own references. If a set has no model
    write "MODEL ANCHOR — SET N: No model.
    Product-only shots."

    QUALITY GATE — ALL 3 SETS:
    Before finalising the style bible, review
    all three SET DNA PROMPT BLOCKs side by side.
    Each must be:
    - 60-80 words (same length, same depth)
    - Equally specific in lighting, colour,
      energy, and model presence
    - Free of any shoulder-strap or crossbody
      carry language

    Set 3 must be as complete and specific as
    Set 1. Rewrite any set that falls short
    before submitting.

    SHOT LIST:
    Write {images_per_sprint} shots.
    Each shot must feel like it could have
    been taken in the same session as the
    reference images — same world, same props
    language, same lighting, different
    composition or angle.

    VARIETY RULE:
    Every shot must be a fresh composition —
    different angle, different distance,
    different prop arrangement, different
    relationship between bag and setting.
    No two shots should look like variations
    of the same scene.

    For each shot write a specific composition
    description that:
    - Places the bag in a different position
      or context than the previous shot
    - Uses a different camera angle or distance
    - Features different props or prop arrangement
    - Tells a slightly different story within
      the same creative world

    Think of the refs as defining a creative
    language — vocabulary of settings, props,
    lighting, and mood. Use that vocabulary
    to write 40 different sentences, not the
    same sentence 40 times.

    THREE CORE PILLARS — distribute all shots
    across these three pillars:

    PILLAR A — FULL MODEL (50% of shots)
    The model is fully or mostly present.
    Bag is part of their world.
    Categories within this pillar:
    [MODEL] 20% — full model, natural interaction
    [MOTION] 13% — movement and energy
    [INTERACTION] 7% — multiple people
    [ATMOSPHERE] 10% — wide shot, model present

    PILLAR B — DETAILS (25% of shots)
    No full model. Focus on parts and texture.
    Categories within this pillar:
    [PARTIAL] 13% — hands, legs, arms only
    [DETAIL] 12% — extreme close-up of fabric,
    hardware, pattern, label

    PILLAR C — OPEN BAG WITH FOOD (25% of shots)
    Bag is open. Food or drink is visible.
    Categories within this pillar:
    [OPEN] 10% — bag open showing contents
    [UNPACK] 15% — person removing food/drink
    from open bag — MANDATORY minimum 2 shots

    Total = 100%

    [HERO] and [PROPS] are retired.
    Every shot must belong to one of the
    three pillars above.

    For a 17-image set the distribution is:
    Pillar A: 9 shots (MODEL x3, MOTION x2,
              INTERACTION x1, ATMOSPHERE x2,
              one extra MODEL)
    Pillar B: 4 shots (PARTIAL x2, DETAIL x2)
    Pillar C: 4 shots (OPEN x2, UNPACK x2)

    OPTICAL PROPERTIES — include in composition
    description when relevant to the shot type:

    [DETAIL] shots — always specify:
    "Shallow depth of field — subject sharp,
    background softly out of focus."

    [MOTION] shots — always specify:
    "Directional motion blur consistent with
    movement direction — [describe direction].
    Subject slightly blurred, environment sharp
    OR subject sharp, environment blurred."

    [ATMOSPHERE] shots with backlight — add:
    "Subtle lens flare from light source —
    organic, not digital. Light bleeds slightly
    into frame edges."

    [HERO] shots — optionally add:
    "Shallow depth of field on background, bag
    tack sharp."

    These optical properties are written into
    the composition description and passed
    directly to Nano Banana at generation time.
    The FilmProcessor adds grain and tone curve
    on top of whatever Nano Banana generates.

    For {images_per_sprint} = 10:
    Hero: 2, Model: 2, Motion: 2, Partial: 1,
    Atmosphere: 1, Detail: 1, Props: 1

    For {images_per_sprint} = 40:
    Hero: 6, Model: 8, Motion: 6, Partial: 4,
    Atmosphere: 4, Detail: 6, Props: 4, Interaction: 2

    For {images_per_sprint} = 60:
    Hero: 9, Model: 12, Motion: 9, Partial: 6,
    Atmosphere: 6, Detail: 9, Props: 6, Interaction: 3

    Always calculate from {images_per_sprint}
    at runtime. Never use fixed numbers.
    Show the calculated distribution at the
    top of the Shot List before listing shots:

    "Shot distribution for {images_per_sprint} images:
    Hero: N | Model: N | Motion: N | Partial: N |
    Atmosphere: N | Detail: N | Props: N | Interaction: N"

    No category should have 0 shots regardless
    of total count — minimum 1 per category
    always, distribute remainder to largest
    categories first.

    Tag each shot using these categories:
    [HERO] [MODEL] [MOTION] [PARTIAL]
    [ATMOSPHERE] [DETAIL] [PROPS] [INTERACTION]

    Use only tags that match what the refs show.
    If refs show no model use only [ATMOSPHERE]
    [DETAIL] [PROPS].
  expected_output: >
    ═══════════════════════════════════════
    PART 1 — STYLE BIBLE
    Concept: [Name] | Brand: {brand_name} | Sprint: {current_season}
    ═══════════════════════════════════════

    MOOD
    [2-3 sentences grounded in the style reference image]

    BACKGROUNDS
    [Material, colour + HEX, texture — from brand palette]

    COLOUR PALETTE
    [3-5 colours with HEX — from brand palette]

    bag PRESENTATION
    [How product sits in every frame]

    PROPS
    Allowed: YES/NO
    If yes: [only if rhyming with bag shape/colour]

    NEGATIVE SPACE
    Minimum: [%] of frame

    COMPOSITION PHILOSOPHY
    [What visual rules govern all compositions in this shoot,
    derived from the composition references provided]

    DO NOT INCLUDE
    [From {shoot_dont_list} plus shoot-specific additions]

    ═══════════════════════════════════════
    PART 2 — TECHNICAL SPEC
    Applies to every image in this shoot without exception
    ═══════════════════════════════════════

    Camera: [body type]
    Lens: [focal length] [max aperture]
    Aperture: f/[value]
    Shutter speed: [range]
    ISO: [range]
    Key light: [direction, quality, modifier, Kelvin]
    Fill light: [ratio, direction]
    Background light: [yes/no, treatment]
    Shadow treatment: [hard/soft/none, direction]
    White balance: [Kelvin]
    Post-processing: [1-2 sentences]

    ═══════════════════════════════════════
    SHOOT STRUCTURE
    ═══════════════════════════════════════

    [Define SET 1, SET 2, and SET 3 here — all three
    are mandatory and must be equally detailed.
    Follow location/lighting/surface/mood/focus/DNA
    structure for each set. Include MODEL ANCHOR
    per set immediately after each SET DNA PROMPT BLOCK.]

    ═══════════════════════════════════════
    MODEL ANCHORS (one per set)
    ═══════════════════════════════════════

    MODEL ANCHOR — SET 1: [gender, age range, skin tone,
    hair, clothing — from Set 1 reference images only]

    MODEL ANCHOR — SET 2: [gender, age range, skin tone,
    hair, clothing — from Set 2 reference images only.
    May differ from Set 1 if refs show a different person.]

    MODEL ANCHOR — SET 3: [gender, age range, skin tone,
    hair, clothing — from Set 3 reference images only.
    May differ from Sets 1 and 2 if refs show a different person.]

    ═══════════════════════════════════════
    PART 3 — SHOT LIST
    Total shots: [N]
    ═══════════════════════════════════════

    [SHOOT-SPR26-S1-001]
    Shot Type: [bag in use/PRODUCT/DETAIL/LIFESTYLE/HELD]
    Format: 3:4
    Product: [specific Lunchbag bag name]
    Composition: [detailed framing instruction — never
    imply crossbody carry or shoulder strap carry]
    Mood: [feeling]
    Notes: STANDARD or [deviation]
    Model: [matches MODEL ANCHOR for this set, or N/A]

    [repeat for every shot]
  agent: visual_director
  context:
    - build_creative_brief
  output_file: outputs/style_bible_and_shot_list.md

# ════════════════════════════════════════════════════════════
# TASK 4 — IMAGE GENERATION PACKAGE
# ════════════════════════════════════════════════════════════
build_image_generation_package:
  description: >
    Read the Style Bible, Technical Spec, and Shot List from
    outputs/style_bible_and_shot_list.md

    Build every image generation prompt using this structure:

    PROMPT STRUCTURE (apply to every shot):
    1. PRODUCT CONTEXT: Describe how the featured bag
       interacts with the model or scene. Use: {product_materials}.
       Do NOT name the bag — the tool provides the 
       correct visual reference automatically.
    2. TECHNICAL SPEC: Apply the exact Technical Spec from
       Part 2 of the Style Bible document. This block is 
       IDENTICAL for every prompt.
    3. COMPOSITION: Apply the specific composition instruction
       from this shot's Shot List entry.
    4. STYLE: Apply the mood, background, and colour palette
       rules from the Style Bible.
    5. STYLE ANCHOR: End every prompt with: {imagen_style_anchor}

    CONTINUOUS GENERATION:
    Generate ALL shots in one continuous run. Use the approved 
    prompt structure. Save with final reference codes.
    Update the catalog after every successful generation.

    When calling the image generation tool, always pass
    exactly 3 pipe-separated fields in this exact order:
    creative_prompt|aspect_ratio|reference_code

    Input format for each shot:
    creative_prompt|aspect_ratio|reference_code

    Reference codes must use this format:
    S[SET]-[SHOT]
    e.g. S1-001, S2-007, S3-010

    The full filename will be constructed
    automatically by the ImageGeneratorTool
    as: [shoot_id]-[ref_code].png
    e.g. lunchbag-SPR-26-03-20-S1-001.png

    Do not include the shoot_id in the
    creative_prompt input — only use the
    ref_code portion: S1-001

    Never invent creative decisions. Every element must come
    from the Style Bible, Technical Spec, or Shot List only.

    After generating all images, produce a CATALOG MANIFEST — a
    structured index of all shots with reference codes,
    formats, content types, prompt summaries, and the local file path 
    returned by the tool.

    GENERATION VERIFICATION RULE — NON NEGOTIABLE:
    After every image generation check the tool
    response. A successful generation returns a
    line starting with "SUCCESS".
    Any response starting with "GENERATION_FAILED"
    or "TOOL_ERROR" means the image was NOT saved.

    For every failed generation:
    - Log the ref_code that failed
    - Immediately retry that exact shot up to
      3 times before moving to the next shot
    - If all 3 retries fail mark it as permanently
      failed and continue

    If IMAGES_THIS_SET environment variable
    is set, generate exactly that many images
    for the current set and stop.

    Before reporting the task complete:
    - Count the actual files in
      asset_library/images/
    - Compare against the target ({images_per_sprint} or IMAGES_THIS_SET if provided)
    - If count is less than the target
      regenerate the missing shots using their
      ref_codes from the Shot List
    - Only report complete when file count matches
      the target

    Print this line before starting generation:
    "Starting generation of images.
    Will verify each save before proceeding."

    Print this line after every 5 successful saves:
    "Progress: [saved]/[total] images confirmed saved."

    Print this line when complete:
    "Generation complete: [N] images confirmed in
    asset library."
  expected_output: >
    A complete Image Generation Report structured as:

    ═══════════════════════════════════════
    IMAGE GENERATION PACKAGE
    Brand: {brand_name}
    Sprint: {current_season}
    Total shots processed: [N]
    Generated: {current_date}
    ═══════════════════════════════════════

    [SHOOT-SPR26-S1-001]
    Status: [SUCCESS/FAILED]
    File Path: [path from tool]
    Prompt used: [The full production prompt]

    [repeat for every shot including buffer shots]

    ═══════════════════════════════════════
    CATALOG MANIFEST
    ═══════════════════════════════════════
    Code          | Format | Type         | File Path
    ──────────────|────────|──────────────|──────────────
    SHOOT-SPR26-S1-001 | 3:4    | promotional  | [path]
    [continue for all shots]
  agent: photographer
  context:
    - create_style_bible
  output_file: outputs/image_generation_package.md

run_film_processor:
  description: >
    Apply film-like post-processing to all
    generated images. Call the FilmProcessorTool
    with an empty string.

    This must run AFTER image generation and
    BEFORE the Photo Editor review so the
    Photo Editor evaluates the final processed
    images not the raw generated ones.

    After the tool completes report:
    - How many images were processed
    - Any errors
  expected_output: >
    Film processing complete. All approved
    images have tone curve, grain, and vignette
    applied.
  agent: photographer

run_photo_editor:
  description: >
    Run the Photo Editor Tool to review all generated
    images in the asset library.
    Call the PhotoEditorTool with an empty string input.

    The tool will automatically:
    - Review every image against 8 quality criteria
    - Apply targeted fixes to images that fail
    - Re-review fixes before accepting them
    - Save a full report with per-image verdicts

    ALSO: Check for any images with 'Art Review-'
    prefix in the asset library. For these images
    read the art_director_latest.md report to find
    the REGENERATION NOTE for each flagged image
    and use it as the fix instruction when calling
    _fix_image. After fixing rename the file back
    to its original name without the Art Review-
    prefix.

    After the tool completes, report the summary:
    - Total reviewed
    - First-pass approval rate
    - How many were fixed
    - How many remain flagged for manual review
  expected_output: >
    Photo Editor review complete. Summary of results
    with approval rate and list of any flagged images.
  agent: visual_director

write_catalog:
  description: >
    Generate a JSON catalog of all approved images.
    Call the CatalogWriterTool with an empty string.
    This tool will:
    1. Parse the Photo Editor report for image statuses.
    2. Scan the asset library for final image files.
    3. Build a structured catalog.json with metadata.
    4. Skip any flagged or unreviewed images.
  expected_output: >
    Catalog update complete. Structured JSON saved to
    asset_library/catalog.json.
  agent: photographer

run_art_director:
  description: >
    Run the Art Director Tool to review all approved
    images for composition drift, lighting drift,
    and mood drift.
    Call the ArtDirectorTool with an empty string.

    After the tool completes report the summary:
    - Total images reviewed
    - How many passed
    - How many flagged for rework with their
      regeneration notes

    The flagged images have been renamed with
    Art Review- prefix and their regeneration notes
    are in the report. The Photo Editor should be
    run again after this to fix the flagged images
    using the regeneration notes as fix instructions.
  expected_output: >
    Art Direction review complete. Summary of creative
    quality across the full shoot with batch
    observations and list of any images flagged
    for rework.
  agent: visual_director

run_copywriter:
  description: >
    Run the CopywriterTool to write Instagram
    copy for all approved images.
    Call with empty string.
    The tool reads the Brand Voice Guide and
    Greek seasonal calendar automatically.
    Report how many images had copy written.
  expected_output: >
    Copy written for all approved images.
    Saved to outputs/copy_latest.json
  agent: photographer

run_content_planner:
  description: >
    Run ContentPlannerTool to build the weekly
    Instagram posting calendar.
    Call with empty string.
    The tool selects 5 images across content
    pillars and schedules Mon/Tue/Thu/Fri/Sat.
    Report the full calendar with dates, times,
    pillars, and image references.
  expected_output: >
    Weekly calendar with 5 posts scheduled.
    Saved to outputs/weekly_calendar.md
  agent: photographer

run_review_generator:
  description: >
    Run the ReviewGeneratorTool to generate
    a standalone HTML review file.
    Call with empty string.
    The file will be saved to
    outputs/review.html and can be opened
    directly in any browser.
  expected_output: >
    Review file generated at
    outputs/review.html
  agent: photographer

generate_sprint_report:
  description: >
    Generate the final Sprint Report for this sprint.

      First collect timing data by reading the timestamps
      from the output files to estimate step durations.

      Calculate step durations using file modification
      times as proxies for step completion.

      Use this Python logic to get modification times:
      import os
      from pathlib import Path

      outputs = Path("outputs")

      def mtime(filename):
          p = outputs / filename
          return p.stat().st_mtime if p.exists() else None

      times = {
          "brief":      mtime("creative_brief.md"),
          "bible":      mtime("style_bible_and_shot_list.md"),
          "package":    mtime("image_generation_package.md"),
          "photo_ed":   mtime("photo_editor_latest.md"),
          "catalog":    mtime("art_director_latest.md"),
          "art_dir":    mtime("art_director_latest.md"),
          "copy":       mtime("copy_latest.json"),
          "planner":    mtime("weekly_calendar.md"),
          "review":     mtime("review.html"),
          "report":     mtime("sprint_report_latest.md"),
      }

      Calculate each step duration as the difference
      between consecutive modification times.
      IMPORTANT: If the result of any subtraction is
      negative, set that step duration to 0.
      Never pass a negative number as a step duration.

      Use this order for the differences:
      - creative_brief:              brief - sprint_start
      - create_style_bible:          bible - brief
      - build_image_generation:      package - bible
      - run_film_processor:          0 (in-place modification)
      - run_photo_editor:            photo_ed - package
      - write_catalog:               catalog - photo_ed
      - run_art_director:            art_dir - catalog
      - run_copywriter:              copy - art_dir
      - run_content_planner:         planner - copy
      - run_review_generator:        review - planner

      Sprint start time: use the modification time of
      creative_brief.md minus the known average brief
      generation time of 3 minutes as an approximation,
      OR read it from the first line of
      creative_brief.md if a timestamp is present.

      Then call the Sprint Reporter Tool with a JSON string
      in this format:
      {
        "sprint_id": "[extract from image filenames]",
        "started_at": "[modification time of creative_brief.md]",
        "steps": {
          "build_creative_brief": [seconds],
          "create_style_bible": [seconds],
          "build_image_generation_package": [seconds],
          "run_film_processor": [seconds],
          "run_photo_editor": [seconds],
          "write_catalog": [seconds],
          "run_art_director": [seconds],
          "run_copywriter": [seconds],
          "run_content_planner": [seconds],
          "run_review_generator": [seconds]
        },
        "images_planned": [read from image_generation_package.md],
        "errors": []
      }

      After the tool runs confirm the report has been
      saved and provide the path to the user.
  expected_output: >
    Sprint Report generated and saved to
    outputs/sprint_report_latest.md
    and outputs/sprint_reports/
    with timestamp. Report covers all 9 sections.
  agent: photographer

